name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install build-essential (required for mlua vendored Lua C build)
        run: sudo apt-get install -y build-essential

      - name: Test spark-core
        run: cargo test -p spark-core

      - name: Test spark-desktop
        run: cargo test -p spark-desktop

      - name: Clippy spark-core
        run: cargo clippy -p spark-core -- -D warnings

      - name: Clippy spark-desktop
        run: cargo clippy -p spark-desktop -- -D warnings

      - name: Check formatting
        run: cargo fmt --all -- --check

  embedded:
    name: Embedded Build (RP2350)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv8m.main-none-eabihf

      - name: Install ARM GCC toolchain
        run: sudo apt-get install -y gcc-arm-none-eabi

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build spark-pico (release)
        env:
          CC_thumbv8m_main_none_eabihf: arm-none-eabi-gcc
          AR_thumbv8m_main_none_eabihf: arm-none-eabi-ar
        run: cargo build --release -p spark-pico --target thumbv8m.main-none-eabihf
